<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
    <title>BookLoop | Premium Reservation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* Premium Card Styling */
        .book-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
        }
        .book-card:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-color: #e2e8f0;
        }

        /* Floating Cart for Mobile */
        @media (max-width: 1024px) {
            #sidebar {
                position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
                transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                max-height: 80vh; border-radius: 40px 40px 0 0;
            }
            #sidebar.active { transform: translateY(0); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-grad {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-grad:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body class="pb-24 lg:pb-0">

    <div id="overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm transition-opacity"></div>

    <header class="sticky top-0 z-30 glass border-b border-slate-100 px-6 py-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter italic gradient-text">BookLoop.</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Curated Reading Collection</p>
            </div>
            
            <div class="flex flex-1 max-w-2xl gap-2">
                <input id="searchTitle" type="search" placeholder="Search titles..." class="w-full bg-slate-100 rounded-2xl px-5 py-3 text-sm border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                <button id="mobileCartBtn" class="lg:hidden btn-grad text-white px-6 rounded-2xl text-sm font-bold shadow-lg flex items-center gap-2">
                    <span id="mobileCount">0</span> 🛒
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <main class="flex-1">
                <div class="flex items-center gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar">
                    <select id="filterAuthor" class="bg-white border border-slate-200 rounded-full px-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-indigo-500 outline-none"><option value="">All Authors</option></select>
                    <select id="filterGenre" class="bg-white border border-slate-200 rounded-full px-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-indigo-500 outline-none"><option value="">All Genres</option></select>
                </div>
                
                <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                    </div>
            </main>

            <aside id="sidebar" class="w-full lg:w-[380px] bg-white p-8 lg:rounded-[40px] border border-slate-100 shadow-xl flex flex-col h-fit lg:sticky lg:top-32">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold tracking-tight">Checkout</h3>
                    <button id="clearCart" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-rose-500 transition-colors">Clear All</button>
                </div>
                
                <div id="cartContent" class="space-y-4 mb-8 flex-grow overflow-y-auto max-h-[40vh] pr-2">
                    <div class="py-20 text-center opacity-40">
                        <div class="text-4xl mb-4">📖</div>
                        <p class="text-xs font-bold uppercase tracking-widest">Your bag is empty</p>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-3xl p-6 space-y-3">
                    <div class="flex justify-between text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                        <span>Subtotal</span> <span id="totalQty" class="text-slate-900">0 Items</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Amount</span>
                        <span id="grandTotal" class="text-3xl font-black text-indigo-600">₱0.00</span>
                    </div>
                </div>

                <button id="confirmBtn" class="w-full mt-6 btn-grad text-white py-5 rounded-[24px] font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                    Confirm Reservation
                </button>
                <div id="confirmationBox" class="hidden mt-6 animate-pop"></div>
                <button id="closeCart" class="lg:hidden w-full mt-6 text-slate-400 text-[10px] font-bold tracking-widest py-2">DISMISS</button>
            </aside>
        </div>
    </div>

    <div id="disclaimerModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[48px] p-12 shadow-2xl text-center animate-pop">
            <div class="text-5xl mb-6">✨</div>
            <h2 class="text-3xl font-black text-slate-900 mb-4 tracking-tight">Welcome back.</h2>
            <p class="text-sm text-slate-500 mb-10 leading-relaxed">Please acknowledge that items are for <b>Store Pick-up</b> only. Secure your Order ID to proceed.</p>
            
            <button id="continueBtn" class="w-full btn-grad text-white py-5 rounded-3xl font-bold shadow-xl shadow-indigo-100 hover:scale-[1.02] active:scale-95 transition-all">
                Enter Portal
            </button>
        </div>
    </div>

    <script>
        const LOCAL_INVENTORY = 'inventory.json';
        const API_URL = 'https://script.google.com/macros/s/AKfycbyGDZueQrS9JLbvRafZalycieiaDGaiaEpm5uGy__h85W7E8CK78wQVsjockO-Or0PD/exec';
        const FORM_BASE = 'https://forms.gle/UupGJgXhZwab9aXr6';
        const FORM_ORDER_FIELD = 'entry.813489840';

        let inventory = [], cart = {};
        const qs = s => document.querySelector(s);
        const fmt = n => '₱' + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2});

        /* --- UI HELPERS --- */
        const toggleCart = () => { 
            qs('#sidebar').classList.toggle('active'); 
            qs('#overlay').classList.toggle('hidden'); 
        };
        qs('#mobileCartBtn').onclick = toggleCart;
        qs('#closeCart').onclick = toggleCart;
        qs('#overlay').onclick = toggleCart;

        qs('#continueBtn').onclick = () => {
            qs('#disclaimerModal').remove();
            loadInventory();
        };

        /* --- CORE LOGIC --- */
        async function loadInventory() {
            try {
                const res = await fetch(LOCAL_INVENTORY);
                inventory = await res.json();
                renderBooks(inventory);
                populateFilters();
            } catch(e) { 
                qs('#booksGrid').innerHTML = "<div class='col-span-full text-center py-20 text-rose-500 font-bold'>⚠️ inventory.json not found in root folder.</div>";
            }
        }

        function populateFilters() {
            const authors = [...new Set(inventory.map(b => b.Author).filter(Boolean))].sort();
            const genres = [...new Set(inventory.map(b => b.Genre).filter(Boolean))].sort();
            qs('#filterAuthor').innerHTML += authors.map(a => `<option value="${a}">${a}</option>`).join('');
            qs('#filterGenre').innerHTML += genres.map(g => `<option value="${g}">${g}</option>`).join('');
        }

        function renderBooks(list) {
            qs('#booksGrid').innerHTML = list.map(book => {
                // ROBUST PRICING ENGINE
                // This looks for "Discounted Price", "Discount", or "SalePrice" to prevent naming errors
                const discountVal = book['Discounted Price'] || book['Discount'] || book['Sale Price'];
                const hasDiscount = discountVal && Number(discountVal) < Number(book.Price);
                const finalPrice = hasDiscount ? Number(discountVal) : Number(book.Price);

                return `
                <div class="book-card bg-white p-8 rounded-[40px] flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">${book.Genre || 'Collection'}</span>
                            ${hasDiscount ? '<span class="bg-rose-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase shadow-lg shadow-rose-100">Sale</span>' : ''}
                        </div>
                        <h3 class="font-bold text-slate-800 text-xl leading-tight mb-2 group-hover:text-indigo-600 transition-colors">${book.Title}</h3>
                        <p class="text-xs font-medium text-slate-400 italic">by ${book.Author}</p>
                    </div>
                    
                    <div class="mt-10 flex items-center justify-between">
                        <div class="flex flex-col">
                            ${hasDiscount ? `<span class="text-xs text-slate-300 line-through font-bold mb-1">${fmt(book.Price)}</span>` : ''}
                            <span class="font-black text-slate-900 text-2xl tracking-tighter">${fmt(finalPrice)}</span>
                        </div>
                        <button onclick="addToCart('${book.Book_Code}', '${book.Title.replace(/'/g, "\\'")}', ${finalPrice})" 
                                class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-indigo-600 transition-all active:scale-90 shadow-lg">
                            <span class="text-xl font-light">+</span>
                        </button>
                    </div>
                </div>`}).join('');
        }

        function addToCart(code, title, price) {
            if (cart[code]) cart[code].qty++;
            else cart[code] = { code, title, price, qty: 1 };
            renderCart();
            
            // Subtle feedback
            const btn = qs('#mobileCartBtn');
            btn.classList.add('scale-110');
            setTimeout(() => btn.classList.remove('scale-110'), 200);
        }

        function renderCart() {
            const items = Object.values(cart);
            let total = 0, qty = 0;
            const container = qs('#cartContent');
            
            if(!items.length) {
                container.innerHTML = '<div class="py-20 text-center opacity-40"><p class="text-xs font-bold uppercase tracking-widest">Bag is empty</p></div>';
            } else {
                container.innerHTML = items.map(item => {
                    total += (item.price * item.qty); qty += item.qty;
                    return `
                    <div class="flex justify-between items-center bg-slate-50 p-5 rounded-3xl animate-pop">
                        <div class="flex-1 pr-4">
                            <h4 class="text-[11px] font-extrabold text-slate-800 uppercase tracking-tight truncate">${item.title}</h4>
                            <p class="text-[10px] font-bold text-indigo-500 mt-1">${fmt(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white px-3 py-2 rounded-xl shadow-sm">
                            <button onclick="updateQty('${item.code}', ${item.qty - 1})" class="text-slate-300 hover:text-rose-500 font-bold">-</button>
                            <span class="text-xs font-black w-4 text-center">${item.qty}</span>
                            <button onclick="updateQty('${item.code}', ${item.qty + 1})" class="text-slate-300 hover:text-indigo-600 font-bold">+</button>
                        </div>
                    </div>`;
                }).join('');
            }
            qs('#totalQty').innerText = qty + ' Items';
            qs('#mobileCount').innerText = qty;
            qs('#grandTotal').innerText = fmt(total);
        }

        function updateQty(code, v) { 
            if(v <= 0) delete cart[code]; 
            else cart[code].qty = v; 
            renderCart(); 
        }

        qs('#clearCart').onclick = () => { if(confirm("Clear selection?")) { cart = {}; renderCart(); }};

        /* --- SUBMISSION --- */
        qs('#confirmBtn').onclick = async () => {
            const items = Object.values(cart);
            if (!items.length) return alert("Your bag is empty.");
            
            const btn = qs('#confirmBtn');
            btn.disabled = true; 
            btn.innerText = "Processing Reservation...";
            
            const grandTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);

            try {
                const payload = { items, total: grandTotal, totalItem: items.length };
                const body = 'data=' + encodeURIComponent(JSON.stringify(payload));
                const resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body });
                const data = await resp.json();
                
                if (data.success) {
                    const formLink = `${FORM_BASE}?${FORM_ORDER_FIELD}=${data.orderID}`;
                    qs('#confirmationBox').innerHTML = `
                        <div class="bg-indigo-600 p-8 rounded-[32px] text-center shadow-2xl">
                            <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Reserved Successfully</p>
                            <h4 class="text-white font-black text-2xl italic mb-6">#${data.orderID}</h4>
                            <button onclick="handleFinalize('${formLink}')" class="w-full bg-white text-indigo-600 py-4 rounded-2xl text-xs font-black shadow-lg uppercase tracking-widest">Complete Payment</button>
                        </div>`;
                    qs('#confirmationBox').classList.remove('hidden');
                    btn.classList.add('hidden');
                    cart = {}; renderCart();
                }
            } catch (e) { 
                alert("Connection error. Please try again."); 
                btn.disabled = false; 
                btn.innerText = "Confirm Reservation"; 
            }
        };

        function handleFinalize(url) {
            window.open(url, '_blank');
            setTimeout(() => { 
                document.body.innerHTML = `<div class="h-screen flex items-center justify-center text-center p-12"><div><div class="text-6xl mb-6">🚀</div><h1 class="text-3xl font-black italic tracking-tighter mb-2">Order Forwarded.</h1><p class="text-slate-400 text-sm mb-10">Finish your payment in the new tab to secure your books.</p><button onclick="location.reload()" class="bg-slate-100 px-8 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-slate-200 transition-all">New Reservation</button></div></div>`; 
            }, 1000);
        }

        /* --- SEARCH FILTERING --- */
        const filterAction = () => {
            const q = qs('#searchTitle').value.toLowerCase();
            const a = qs('#filterAuthor').value;
            const g = qs('#filterGenre').value;
            renderBooks(inventory.filter(b => 
                b.Title.toLowerCase().includes(q) && 
                (!a || b.Author === a) && 
                (!g || b.Genre === g)
            ));
        };
        qs('#searchTitle').oninput = filterAction;
        qs('#filterAuthor').onchange = filterAction;
        qs('#filterGenre').onchange = filterAction;

    </script>
</body>
</html>
