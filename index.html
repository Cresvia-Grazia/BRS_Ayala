<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
    <title>BookLoop | Premium Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfd; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .book-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #f1f5f9; }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.12); }
        @media (max-width: 1024px) {
            #sidebar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; transform: translateY(100%); transition: transform 0.5s ease; max-height: 80vh; border-radius: 40px 40px 0 0; }
            #sidebar.active { transform: translateY(0); }
        }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .gradient-text { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="pb-24 lg:pb-0">

    <div id="overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm"></div>

    <header class="sticky top-0 z-30 glass border-b border-slate-100 px-6 py-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
            <h1 class="text-3xl font-extrabold italic gradient-text">BookLoop.</h1>
            <div class="flex flex-1 max-w-2xl gap-2">
                <input id="searchTitle" type="search" placeholder="Search title..." class="w-full bg-slate-50 rounded-2xl px-5 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                <button id="mobileCartBtn" class="lg:hidden gradient-bg text-white px-6 rounded-2xl text-sm font-bold shadow-lg">🛒 <span id="mobileCount">0</span></button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col lg:flex-row gap-12">
            <main class="flex-1">
                <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </main>

            <aside id="sidebar" class="w-full lg:w-[380px] bg-white p-8 lg:rounded-[48px] border border-slate-100 shadow-2xl flex flex-col h-fit lg:sticky lg:top-32">
                <h3 class="text-xl font-bold mb-8">Your Basket</h3>
                <div id="cartContent" class="space-y-4 mb-8 overflow-y-auto max-h-[40vh]"></div>
                <div class="bg-slate-50 rounded-[32px] p-8 space-y-4">
                    <div class="flex justify-between text-[11px] font-bold text-slate-400 uppercase">
                        <span>Items</span> <span id="totalQty" class="text-slate-900">0</span>
                    </div>
                    <div class="flex justify-between items-end border-t pt-4">
                        <span class="text-xs font-bold text-slate-400 uppercase">Total</span>
                        <span id="grandTotal" class="text-3xl font-black text-indigo-600">₱0.00</span>
                    </div>
                </div>
                <button id="confirmBtn" class="w-full mt-6 gradient-bg text-white py-5 rounded-[24px] font-bold shadow-xl active:scale-95 transition-all">Confirm Reservation</button>
                <div id="confirmationBox" class="hidden mt-6"></div>
                <button id="closeCart" class="lg:hidden w-full mt-6 text-slate-400 text-[10px] font-bold uppercase tracking-widest">Close</button>
            </aside>
        </div>
    </div>

    <div id="disclaimerModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[56px] p-12 shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-4 tracking-tighter">BookLoop Portal</h2>
            <p class="text-sm text-slate-400 mb-10 leading-relaxed">Book reservations are for store pick-up only.</p>
            <button id="continueBtn" class="w-full gradient-bg text-white py-5 rounded-3xl font-bold shadow-xl">Enter Portal</button>
        </div>
    </div>

    <script>
        const LOCAL_INVENTORY = 'inventory.json';
        const API_URL = 'https://script.google.com/macros/s/AKfycbzud7TEs70qcLoxDeGqDpaZULNla18TeqN4c2aBK3amaVn3p5ym8aH66hsP-WW_P2gL/exec'; 
        const FORM_BASE = 'https://forms.gle/UupGJgXhZwab9aXr6';
        const FORM_ORDER_FIELD = 'entry.813489840';

        let inventory = [], cart = {};
        const qs = s => document.querySelector(s);
        const fmt = n => '₱' + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2});

        qs('#continueBtn').onclick = () => { loadInventory(); };
        const toggleCart = () => { qs('#sidebar').classList.toggle('active'); qs('#overlay').classList.toggle('hidden'); };
        qs('#mobileCartBtn').onclick = toggleCart;
        qs('#closeCart').onclick = toggleCart;
        qs('#overlay').onclick = toggleCart;

        async function loadInventory() {
            try {
                const res = await fetch(LOCAL_INVENTORY);
                if (!res.ok) throw new Error();
                inventory = await res.json();
                renderBooks(inventory);
                qs('#disclaimerModal').remove();
            } catch(e) { alert("Missing inventory.json file!"); }
        }

        function renderBooks(list) {
            qs('#booksGrid').innerHTML = list.map(book => {
                const final = book.Discounted_Price || book.Price;
                return `
                <div class="book-card bg-white p-8 rounded-[40px] border border-slate-100 flex flex-col justify-between">
                    <div>
                        <span class="text-[9px] font-black text-indigo-500 uppercase bg-indigo-50 px-3 py-1 rounded-full">${book.Genre || 'Books'}</span>
                        <h3 class="font-bold text-slate-800 text-lg mt-4">${book.Title}</h3>
                        <p class="text-xs text-slate-400">By ${book.Author}</p>
                    </div>
                    <div class="mt-10 flex items-center justify-between">
                        <span class="font-black text-slate-900 text-2xl tracking-tighter">${fmt(final)}</span>
                        <button onclick="addToCart('${book.Book_Code}', '${book.Title.replace(/'/g, "\\'")}', '${book.Author.replace(/'/g, "\\'")}', ${final}, ${book.Price})" 
                                class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-indigo-600 shadow-lg font-bold text-xl">+</button>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(code, title, author, price, originalPrice) {
            if (cart[code]) cart[code].qty++;
            else cart[code] = { code, title, author, price, originalPrice, qty: 1 };
            renderCart();
        }

        function renderCart() {
            const items = Object.values(cart);
            let total = 0, qty = 0;
            qs('#cartContent').innerHTML = items.length ? items.map(item => {
                total += (item.price * item.qty); qty += item.qty;
                return `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-[24px]">
                    <div class="flex-1"><h4 class="text-[10px] font-black uppercase truncate">${item.title}</h4><p class="text-[10px] text-indigo-500">${fmt(item.price)}</p></div>
                    <div class="flex items-center gap-2"><button onclick="updateQty('${item.code}', ${item.qty-1})">-</button><span>${item.qty}</span><button onclick="updateQty('${item.code}', ${item.qty+1})">+</button></div>
                </div>`;
            }).join('') : '<p class="text-center opacity-30 text-xs">Bag is empty</p>';
            qs('#totalQty').innerText = qty; qs('#mobileCount').innerText = qty; qs('#grandTotal').innerText = fmt(total);
        }

        function updateQty(c, v) { if(v <= 0) delete cart[c]; else cart[c].qty = v; renderCart(); }

        qs('#confirmBtn').onclick = async () => {
            const items = Object.values(cart);
            if (!items.length) return alert("Select books first.");
            const btn = qs('#confirmBtn'); btn.disabled = true; btn.innerText = "Processing...";

            // THE GENERATOR - Matches your requirement
            const orderID = "ORD-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const resID = "RSVID" + new Date().toISOString().split('T')[0].replace(/-/g, '') + Math.floor(1000 + Math.random() * 9000);

            const payload = { 
                reservationID: resID, 
                orderID: orderID, 
                items: items, 
                totalAmount: items.reduce((s,i) => s + (i.price*i.qty),0),
                itemCount: items.reduce((s,i) => s + i.qty,0)
            };

            try {
                const resp = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'}, 
                    body: 'data=' + encodeURIComponent(JSON.stringify(payload)) 
                });
                const data = await resp.json();
                if (data.success) {
                    qs('#confirmationBox').innerHTML = `<div class="bg-indigo-600 p-8 rounded-[40px] text-center text-white animate-pop shadow-2xl">
                        <p class="text-[10px] font-bold uppercase opacity-60 mb-2">Your Order ID</p>
                        <h4 class="text-3xl font-black italic mb-6">#${orderID}</h4>
                        <button onclick="handleFinalize('${FORM_BASE}?${FORM_ORDER_FIELD}=${orderID}')" class="w-full bg-white text-indigo-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">Open Payment Form</button>
                    </div>`;
                    qs('#confirmationBox').classList.remove('hidden'); btn.classList.add('hidden'); cart = {}; renderCart();
                }
            } catch (e) { alert("Sync error."); btn.disabled = false; btn.innerText = "Confirm Reservation"; }
        };

        function handleFinalize(url) { window.open(url, '_blank'); setTimeout(() => location.reload(), 2000); }
    </script>
</body>
</html>
