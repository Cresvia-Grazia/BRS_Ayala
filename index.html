<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
    <title>BookLoop | Premium Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfd; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .book-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #f1f5f9; }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.12); border-color: #e2e8f0; }
        @media (max-width: 1024px) {
            #sidebar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 80vh; border-radius: 40px 40px 0 0; }
            #sidebar.active { transform: translateY(0); }
        }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .gradient-text { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes pulse-soft { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .sale-tag { animation: pulse-soft 2s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="pb-24 lg:pb-0">

    <div id="overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden backdrop-blur-sm transition-opacity"></div>

    <header class="sticky top-0 z-30 glass border-b border-slate-100 px-6 py-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter italic gradient-text">BookLoop.</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Exclusive Collection</p>
            </div>
            <div class="flex flex-1 max-w-2xl gap-2">
                <input id="searchTitle" type="search" placeholder="Search by title..." class="w-full bg-slate-50 rounded-2xl px-5 py-3 text-sm border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                <button id="mobileCartBtn" class="lg:hidden gradient-bg text-white px-6 rounded-2xl text-sm font-bold shadow-lg flex items-center gap-2">
                    <span id="mobileCount">0</span> 🛒
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col lg:flex-row gap-12">
            <main class="flex-1">
                <div class="flex items-center gap-3 mb-10 overflow-x-auto pb-2 no-scrollbar">
                    <select id="filterAuthor" class="bg-white border border-slate-200 rounded-full px-5 py-2 text-[11px] font-bold uppercase tracking-wider outline-none"><option value="">All Authors</option></select>
                    <select id="filterGenre" class="bg-white border border-slate-200 rounded-full px-5 py-2 text-[11px] font-bold uppercase tracking-wider outline-none"><option value="">All Genres</option></select>
                </div>
                <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </main>

            <aside id="sidebar" class="w-full lg:w-[380px] bg-white p-8 lg:rounded-[48px] border border-slate-100 shadow-2xl flex flex-col h-fit lg:sticky lg:top-32">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold tracking-tight text-slate-900">Your Basket</h3>
                    <button id="clearCart" class="text-[10px] font-bold text-slate-300 uppercase tracking-widest hover:text-rose-500">Reset</button>
                </div>
                <div id="cartContent" class="space-y-4 mb-8 flex-grow overflow-y-auto max-h-[40vh] pr-2">
                    <div class="py-20 text-center opacity-20">
                        <p class="text-[10px] font-bold uppercase tracking-widest">Bag is empty</p>
                    </div>
                </div>
                <div class="bg-slate-50 rounded-[32px] p-8 space-y-4">
                    <div class="flex justify-between text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                       <span>Quantity</span> <span id="totalQty" class="text-slate-900 font-black">0</span>
                    </div>
                    <div class="flex justify-between items-end border-t border-slate-200 pt-4">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total</span>
                        <span id="grandTotal" class="text-3xl font-black text-indigo-600">₱0.00</span>
                    </div>
                </div>
                <button id="confirmBtn" class="w-full mt-6 gradient-bg text-white py-5 rounded-[24px] font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all">Confirm Reservation</button>
                <div id="confirmationBox" class="hidden mt-6"></div>
                <button id="closeCart" class="lg:hidden w-full mt-6 text-slate-400 text-[10px] font-bold tracking-widest py-2">DISMISS</button>
            </aside>
        </div>
    </div>

    <div id="disclaimerModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[56px] p-12 shadow-2xl text-center">
            <h2 class="text-3xl font-black text-slate-900 mb-4 tracking-tighter">Welcome</h2>
            <p class="text-sm text-slate-400 mb-10 leading-relaxed">Book reservations are for store pick-up. Ready to browse the catalog?</p>
            <button id="continueBtn" class="w-full gradient-bg text-white py-5 rounded-3xl font-bold shadow-xl shadow-indigo-100 active:scale-95 transition-all">Enter Portal</button>
        </div>
    </div>

    <div id="summaryModal" class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md hidden">
        <div class="bg-white w-full max-w-md rounded-[40px] p-10 shadow-2xl animate-pop">
            <h3 class="text-2xl font-black text-slate-900 mb-6 tracking-tighter italic">Order Summary</h3>
            <div id="summaryItems" class="space-y-4 max-h-[40vh] overflow-y-auto mb-8 pr-2 text-sm text-slate-600"></div>
            <div class="border-t border-slate-100 pt-6 mb-8">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Grand Total</span>
                    <span id="summaryTotal" class="text-2xl font-black text-indigo-600">₱0.00</span>
                </div>
            </div>
            <button onclick="closeSummary()" class="w-full bg-slate-100 text-slate-900 py-4 rounded-2xl text-xs font-bold uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script>
        const LOCAL_INVENTORY = 'inventory.json';
        const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; 
        const FORM_BASE = 'https://forms.gle/UupGJgXhZwab9aXr6';
        const FORM_ORDER_FIELD = 'entry.813489840';

        let inventory = [], cart = {};
        const qs = s => document.querySelector(s);
        const fmt = n => '₱' + Number(n).toLocaleString(undefined, {minimumFractionDigits: 2});

        const toggleCart = () => { qs('#sidebar').classList.toggle('active'); qs('#overlay').classList.toggle('hidden'); };
        qs('#mobileCartBtn').onclick = toggleCart;
        qs('#closeCart').onclick = toggleCart;
        qs('#overlay').onclick = toggleCart;

        qs('#continueBtn').onclick = () => { qs('#disclaimerModal').remove(); loadInventory(); };

        async function loadInventory() {
            try {
                const res = await fetch(LOCAL_INVENTORY);
                inventory = await res.json();
                renderBooks(inventory);
                populateFilters();
            } catch(e) { console.error("Load failed", e); }
        }

        function populateFilters() {
            const authors = [...new Set(inventory.map(b => b.Author).filter(Boolean))].sort();
            const genres = [...new Set(inventory.map(b => b.Genre).filter(Boolean))].sort();
            qs('#filterAuthor').innerHTML += authors.map(a => `<option value="${a}">${a}</option>`).join('');
            qs('#filterGenre').innerHTML += genres.map(g => `<option value="${g}">${g}</option>`).join('');
        }

        function renderBooks(list) {
            qs('#booksGrid').innerHTML = list.map(book => {
                const origPrice = book.Price ? Number(book.Price) : null;
                const discPrice = book.Discounted_Price ? Number(book.Discounted_Price) : null;
                let finalPrice = discPrice || origPrice || 0;
                let isSale = (origPrice && discPrice && discPrice < origPrice);

                return `
                <div class="book-card bg-white p-8 rounded-[40px] flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">${book.Genre || 'Collection'}</span>
                            ${isSale ? '<span class="sale-tag bg-rose-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase shadow-lg shadow-rose-100">Sale</span>' : ''}
                        </div>
                        <h3 class="font-bold text-slate-800 text-lg leading-snug mb-2 group-hover:text-indigo-600 transition-colors">${book.Title}</h3>
                        <p class="text-xs font-medium text-slate-400">By ${book.Author}</p>
                    </div>
                    <div class="mt-10 flex items-center justify-between">
                        <div class="flex flex-col">
                            ${isSale ? `<span class="text-[10px] text-slate-300 line-through font-bold mb-0.5">${fmt(origPrice)}</span>` : ''}
                            <span class="font-black text-slate-900 text-2xl tracking-tighter">${fmt(finalPrice)}</span>
                        </div>
                        <button onclick="addToCart('${book.Book_Code}', '${book.Title.replace(/'/g, "\\'")}', ${finalPrice}, '${book.Author.replace(/'/g, "\\'")}')" 
                               class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-indigo-600 transition-all shadow-lg active:scale-90">
                            <span class="text-xl font-light">+</span>
                        </button>
                    </div>
                </div>`}).join('');
        }

        function addToCart(code, title, price, author) {
            if (cart[code]) cart[code].qty++;
            else cart[code] = { code, title, price, author: author || "N/A", qty: 1 };
            renderCart();
        }

        function renderCart() {
            const items = Object.values(cart);
            let total = 0, qty = 0;
            const container = qs('#cartContent');
            if(!items.length) {
                container.innerHTML = '<div class="py-20 text-center opacity-20"><p class="text-[10px] font-bold uppercase tracking-widest">Empty</p></div>';
            } else {
                container.innerHTML = items.map(item => {
                    total += (item.price * item.qty); qty += item.qty;
                    return `
                    <div class="flex justify-between items-center bg-slate-50 p-5 rounded-[24px]">
                        <div class="flex-1 pr-4">
                            <h4 class="text-[10px] font-black text-slate-800 uppercase tracking-tight truncate">${item.title}</h4>
                            <p class="text-[10px] font-bold text-indigo-500 mt-0.5">${fmt(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white px-3 py-2 rounded-xl shadow-sm">
                            <button onclick="updateQty('${item.code}', ${item.qty - 1})" class="text-slate-300 hover:text-rose-500 font-bold">-</button>
                            <span class="text-xs font-black w-4 text-center">${item.qty}</span>
                            <button onclick="updateQty('${item.code}', ${item.qty + 1})" class="text-slate-300 hover:text-indigo-600 font-bold">+</button>
                        </div>
                    </div>`;
                }).join('');
            }
            qs('#totalQty').innerText = qty; qs('#mobileCount').innerText = qty; qs('#grandTotal').innerText = fmt(total);
        }

        function updateQty(code, v) { if(v <= 0) delete cart[code]; else cart[code].qty = v; renderCart(); }
        qs('#clearCart').onclick = () => { if(confirm("Reset cart?")) { cart = {}; renderCart(); }};

        qs('#confirmBtn').onclick = async () => {
            const items = Object.values(cart);
            if (!items.length) return alert("Select books first.");
            
            const btn = qs('#confirmBtn');
            btn.disabled = true; btn.innerText = "Securing Order...";

            // ID Generation
            const orderID = "ORD-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            const datePart = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const randomPart = Math.floor(1000 + Math.random() * 9000);
            const reservationID = "RSVID" + datePart + randomPart;

            const grandTotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
            const totalItemsCount = items.reduce((s, i) => s + i.qty, 0);

            try {
                const payload = { 
                    items: items, 
                    totalAmount: grandTotal, 
                    itemCount: totalItemsCount,
                    orderID: orderID,
                    reservationID: reservationID
                };
                const body = 'data=' + encodeURIComponent(JSON.stringify(payload));
                const resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body });
                const data = await resp.json();
                
                if (data.success) {
                    const formLink = `${FORM_BASE}?${FORM_ORDER_FIELD}=${orderID}`;
                    qs('#confirmationBox').innerHTML = `
                        <div class="bg-indigo-600 p-8 rounded-[40px] text-center shadow-2xl animate-pop">
                            <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-widest mb-2">Reservation Secured</p>
                            <h4 class="text-white font-black text-3xl italic mb-6">#${orderID}</h4>
                            <div class="grid grid-cols-2 gap-2 mb-4">
                                <button onclick="copyToClipboard('${orderID}', 'Order ID Copied!')" class="bg-indigo-500 text-white py-3 rounded-2xl text-[10px] font-bold uppercase">Copy ID</button>
                                <button onclick="showSummary()" class="bg-indigo-500 text-white py-3 rounded-2xl text-[10px] font-bold uppercase">Order Summary</button>
                            </div>
                            <button onclick="handleFinalize('${formLink}')" class="w-full bg-white text-indigo-600 py-4 rounded-2xl text-xs font-black shadow-lg uppercase tracking-widest hover:scale-[1.02] transition-all">Go to Payment Form</button>
                        </div>`;
                    
                    qs('#confirmationBox').classList.remove('hidden');
                    btn.classList.add('hidden');
                    renderSummaryModal(items, grandTotal);
                    cart = {}; renderCart();
                }
            } catch (e) { alert("Connection failed."); btn.disabled = false; btn.innerText = "Confirm Order"; }
        };

        function renderSummaryModal(items, total) {
            qs('#summaryItems').innerHTML = items.map(i => `
                <div class="flex justify-between items-center border-b border-slate-50 pb-3">
                    <div class="pr-4">
                        <p class="font-bold text-slate-900 leading-tight">${i.title}</p>
                        <p class="text-[10px] text-slate-400 mt-0.5">${i.qty}x ${fmt(i.price)}</p>
                    </div>
                    <p class="font-black text-slate-700 whitespace-nowrap">${fmt(i.price * i.qty)}</p>
                </div>`).join('');
            qs('#summaryTotal').innerText = fmt(total);
        }

        function showSummary() { qs('#summaryModal').classList.remove('hidden'); }
        function closeSummary() { qs('#summaryModal').classList.add('hidden'); }
        function copyToClipboard(text, msg) { navigator.clipboard.writeText(text).then(() => alert(msg)); }

        function handleFinalize(url) {
            window.open(url, '_blank');
            setTimeout(() => { 
                document.body.innerHTML = `
                <div class="h-screen flex items-center justify-center text-center p-12 bg-white">
                    <div>
                        <div class="text-6xl mb-6">📝</div>
                        <h1 class="text-3xl font-black italic mb-2 tracking-tighter">Form Opened.</h1>
                        <p class="text-slate-400 text-sm mb-10">Paste your Order ID into the payment form to finish.</p>
                        <button onclick="location.reload()" class="bg-slate-100 px-8 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Start New Order</button>
                    </div>
                </div>`; 
            }, 1000);
        }

        const filterAction = () => {
            const q = qs('#searchTitle').value.toLowerCase();
            const a = qs('#filterAuthor').value;
            const g = qs('#filterGenre').value;
            renderBooks(inventory.filter(b => b.Title.toLowerCase().includes(q) && (!a || b.Author === a) && (!g || b.Genre === g)));
        };
        qs('#searchTitle').oninput = filterAction;
        qs('#filterAuthor').onchange = filterAction;
        qs('#filterGenre').onchange = filterAction;
    </script>
</body>
</html>
